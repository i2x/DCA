<!doctype html>
<html lang="th">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="styles.css" />
  <title>Terminal</title>
</head>

<body>
  <div class="wrap">
    <div class="term">
      <!-- TOP BAR -->
      <div class="bar">
        <div class="dots" aria-hidden="true">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
        <div class="title">ASCII Terminal</div>
      </div>

      <!-- CLEAN SPLIT -->
      <div class="shell">
        <!-- LEFT PANE -->
        <section class="pane pane-left">
          <header class="paneHead">
            <div class="prompt">
              <span class="ps1">i2x@Shell</span><span>:</span><span>~</span><span>$</span>
              <span id="cmdHint">dca status</span>
              <span class="cursor" aria-hidden="true"></span>
            </div>
          </header>

          <main class="paneBody">
            <div class="slot" id="leftSlot">
              <pre class="dca" id="dcaOut">loading...</pre>
            </div>
          </main>

          <footer class="paneFoot">
            <div class="subtle">>_</div>
          </footer>
        </section>
        <!-- RIGHT PANE -->
        <section class="pane pane-right">
          <header class="paneHead">
            <div class="rightTitle">
              <div class="live">
                <span class="liveDot"></span>
                Live
              </div>

            </div>

            <div class="meta">


            </div>
          </header>

          <main class="paneBody">
            <!-- Right module slot (future widgets) -->
            <div class="slot" id="rightSlot">
              <pre class="ascii" id="asciiOut">booting...</pre>
            </div>
          </main>

          <footer class="paneFoot">


          </footer>
        </section>
      </div>

      <!-- FOOTER -->
      <div class="footer">



      </div>
    </div>
  </div>

  <!-- SCENES (no fetch => no CORS) -->
  <script src="./scenes/init.js"></script>

  <script src="./scenes/01.js"></script>
  <script src="./scenes/02.js"></script>
  <script src="./scenes/03.js"></script>
  <script src="./scenes/04.js"></script>
  <script src="./scenes/05.js"></script>
  <script src="./scenes/06.js"></script>
  <script src="./scenes/07.js"></script>


  <script src="dca.js"></script>
  <script src="main.js"></script>
</body>

</html>
